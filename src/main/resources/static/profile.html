<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль - Dating App</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
<div class="container">
    <header class="header">
        <h1>❤️ Мой профиль</h1>
        <div class="header-buttons">
            <button class="find-pair-btn" onclick="toggleFindPair()">
                🔍 Найти пару
            </button>
            <button class="logout-btn" onclick="logout()">🚪 Выйти</button>
        </div>
    </header>

    <div class="profile-content">
        <!-- Информация о пользователе -->
        <div class="profile-section">
            <h2>👤 Личная информация</h2>
            <div class="profile-info">
                <div class="info-item">
                    <label>Имя:</label>
                    <span id="firstName">Загрузка...</span>
                </div>
                <div class="info-item">
                    <label>Город:</label>
                    <span id="city">Загрузка...</span>
                </div>
                <div class="info-item">
                    <label>Возраст:</label>
                    <span id="age">Загрузка...</span>
                </div>
                <div class="info-item">
                    <label>Телефон:</label>
                    <span id="phone">Загрузка...</span>
                </div>
                <div class="info-item">
                    <label>Пол:</label>
                    <span id="gender">Загрузка...</span>
                </div>
                <div class="info-item">
                    <label>Роль:</label>
                    <span id="role">Загрузка...</span>
                </div>
                <div class="info-item">
                    <label>Цель знакомства:</label>
                    <span id="lookingFor">Загрузка...</span>
                </div>
            </div>
        </div>

        <!-- Форма редактирования -->
        <div class="profile-section">
            <h2>✏️ Редактировать профиль</h2>
            <form id="editForm" class="edit-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="editFirstName">Имя:</label>
                        <input type="text" id="editFirstName" required>
                    </div>
                    <div class="form-group">
                        <label for="editCity">Город:</label>
                        <input type="text" id="editCity" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="editAge">Возраст:</label>
                        <input type="number" id="editAge" min="18" max="100" required>
                    </div>
                    <div class="form-group">
                        <label for="editGender">Пол:</label>
                        <select id="editGender">
                            <option value="MALE">Мужской</option>
                            <option value="FEMALE">Женский</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="editLookingFor">Цель знакомства:</label>
                        <select id="editLookingFor">
                            <option value="FRIENDSHIP">Дружба</option>
                            <option value="SERIOUS_RELATIONSHIP">Серьёзные отношения</option>
                            <option value="FAMILY">Семья</option>
                            <option value="TALKING">Общение</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="save-btn">💾 Сохранить изменения</button>
            </form>
        </div>
    </div>

    <!-- Модальное окно поиска пар -->
    <div id="findPairModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🔍 Найти пару</h2>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>

            <div class="filters-section">
                <h3>🎯 Фильтры поиска</h3>
                <form id="filterForm" class="filter-form">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label for="filterGender">Пол:</label>
                            <select id="filterGender">
                                <option value="">Любой</option>
                                <option value="MALE">Мужской</option>
                                <option value="FEMALE">Женский</option>
                            </select>
                        </div>

                        <div class="filter-group">
                            <label for="filterCity">Город:</label>
                            <input type="text" id="filterCity" placeholder="Введите город">
                        </div>
                    </div>

                    <div class="filter-row">
                        <div class="filter-group">
                            <label for="minAge">Возраст от:</label>
                            <input type="number" id="minAge" min="18" max="100" placeholder="18">
                        </div>

                        <div class="filter-group">
                            <label for="maxAge">Возраст до:</label>
                            <input type="number" id="maxAge" min="18" max="100" placeholder="100">
                        </div>

                        <div class="filter-group">
                            <label for="lookingFor">Цель знакомства:</label>
                            <select id="lookingFor">
                                <option value="">Любая</option>
                                <option value="FRIENDSHIP">Дружба</option>
                                <option value="SERIOUS_RELATIONSHIP">Серьёзные отношения</option>
                                <option value="FAMILY">Семья</option>
                                <option value="TALKING">Общение</option>
                            </select>
                        </div>
                    </div>

                    <div class="filter-buttons">
                        <button type="submit" class="search-btn">🔍 Поиск</button>
                        <button type="button" class="clear-btn" onclick="clearFilters()">🧹 Очистить</button>
                    </div>
                </form>
            </div>

            <div class="results-section">
                <h3>👥 Результаты поиска</h3>
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <span>Идет поиск...</span>
                </div>
                <div id="resultsContainer" class="results-container">
                    <div class="no-results">Введите критерии поиска и нажмите "Поиск"</div>
                </div>
            </div>
        </div>
    </div>

    <div id="message" class="message" style="display: none;"></div>
</div>

<script src="profile.js"></script>
</body>
</html>
